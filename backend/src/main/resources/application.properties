spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.servlet.encoding.enabled=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# Route optimization microservice
ai.service.connect-timeout-ms=5000
ai.service.read-timeout-ms=120000
ai.service.default-capacity=20
ai.service.default-speed-kmh=25
ai.service.default-fuel-cost-per-km=3000
ai.service.default-start-time=08:00

logistics.auto-assign.enabled=false

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.root=INFO
logging.level.com.logistics=DEBUG

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
logging.file.name=logs/logistics.log