spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

server.servlet.encoding.enabled=true
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# Route optimization microservice
ai.service.connect-timeout-ms=5000
ai.service.read-timeout-ms=120000
ai.service.default-capacity=20
ai.service.default-speed-kmh=25
ai.service.default-fuel-cost-per-km=3000
ai.service.default-start-time=08:00

logistics.auto-assign.enabled=false

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.root=INFO
logging.level.com.logistics=DEBUG
logging.file.name=./logs/logistics.log
logging.logback.rollingpolicy.file-name-pattern=./logs/logistics-%d{yyyy-MM-dd}.%i.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
